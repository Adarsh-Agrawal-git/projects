<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <h2>Rock Paper Scissors</h2>
        <div class="choices">
        <button id="rock" class="choice"><img src="rock logo.jpg" alt=""></button>
        <button id="paper" class="choice"><img src="paper logo.jpg" alt=""></button>
        <button id="scissors" class="choice"><img src="scissors logo.jpg" alt=""></button>
        </div>
        <div class="scoreboard">
            <div class="score">
               <h2 class="user-score">0</h2>
               <p>You</p>
            </div>
            <div class="score">
               <h2 class="comp-score">0</h2>
               <p>Comp</p>
            </div>
        </div>
        <div id="winner">
        </div>
        <button id="reset">Reset Game</button>
    </main>
    <script src="app.js">    
    </script>
    
</body>
</html>
